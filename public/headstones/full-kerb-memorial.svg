<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="granite-kerb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="30%" style="stop-color:#222"/>
      <stop offset="60%" style="stop-color:#333"/>
      <stop offset="100%" style="stop-color:#1e1e1e"/>
    </linearGradient>
    <linearGradient id="kerb-polished" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#252525"/>
    </linearGradient>
    <linearGradient id="grass-k" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c3f"/>
      <stop offset="100%" style="stop-color:#3a6830"/>
    </linearGradient>
    <linearGradient id="chippings" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8c0b8"/>
      <stop offset="50%" style="stop-color:#b8b0a5"/>
      <stop offset="100%" style="stop-color:#d0c8bc"/>
    </linearGradient>
    <filter id="stone-texture-kerb">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="chippings-texture">
      <feTurbulence type="fractalNoise" baseFrequency="3" numOctaves="5" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="overlay" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="shadow-kerb">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="400" height="500" fill="#e8eef5" rx="12"/>

  <!-- Grass -->
  <ellipse cx="200" cy="460" rx="200" ry="60" fill="url(#grass-k)"/>
  <rect x="0" y="460" width="400" height="40" fill="url(#grass-k)"/>

  <!-- Kerb surround - perspective view -->
  <!-- Back kerb -->
  <rect x="55" y="305" width="290" height="18" rx="2" fill="url(#granite-kerb)" filter="url(#shadow-kerb)"/>
  <!-- Left kerb -->
  <rect x="55" y="305" width="18" height="140" rx="2" fill="url(#granite-kerb)"/>
  <!-- Right kerb -->
  <rect x="327" y="305" width="18" height="140" rx="2" fill="#222"/>
  <!-- Front kerb -->
  <rect x="55" y="427" width="290" height="18" rx="2" fill="#282828"/>

  <!-- Gravel/chippings fill inside kerb -->
  <rect x="73" y="323" width="254" height="104" fill="url(#chippings)" filter="url(#chippings-texture)"/>

  <!-- Corner posts -->
  <rect x="55" y="300" width="22" height="10" rx="2" fill="#333" filter="url(#shadow-kerb)"/>
  <rect x="323" y="300" width="22" height="10" rx="2" fill="#2a2a2a"/>
  <rect x="55" y="440" width="22" height="10" rx="2" fill="#282828"/>
  <rect x="323" y="440" width="22" height="10" rx="2" fill="#252525"/>

  <!-- Flower vase holders -->
  <rect x="80" y="310" width="20" height="15" rx="3" fill="#333"/>
  <rect x="300" y="310" width="20" height="15" rx="3" fill="#2d2d2d"/>

  <!-- Headstone base -->
  <rect x="120" y="280" width="160" height="28" rx="2" fill="#2a2a2a" filter="url(#shadow-kerb)"/>

  <!-- Headstone -->
  <path d="M145 285 L145 140 Q145 90 200 75 Q255 90 255 140 L255 285 Z"
        fill="url(#granite-kerb)" filter="url(#stone-texture-kerb)"/>

  <!-- Polished face -->
  <path d="M155 278 L155 148 Q155 103 200 90 Q245 103 245 148 L245 278 Z"
        fill="url(#kerb-polished)" opacity="0.9"/>

  <!-- Engraving -->
  <text x="200" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#b0b0b0" letter-spacing="2">IN LOVING MEMORY</text>

  <line x1="170" y1="157" x2="230" y2="157" stroke="#666" stroke-width="0.5"/>

  <text x="200" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c8c8c8" letter-spacing="1">Robert</text>
  <text x="200" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c8c8c8" letter-spacing="1">Thompson</text>
  <text x="200" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#999">1935 — 2024</text>

  <line x1="170" y1="235" x2="230" y2="235" stroke="#666" stroke-width="0.5"/>

  <text x="200" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#999" font-style="italic">At rest</text>

  <!-- Label -->
  <rect x="100" y="468" width="200" height="24" rx="12" fill="rgba(0,0,0,0.6)"/>
  <text x="200" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" font-weight="500">Full Kerb Memorial</text>
</svg>