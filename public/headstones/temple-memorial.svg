<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="granite-temple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0dcd4"/>
      <stop offset="30%" style="stop-color:#d4cfc6"/>
      <stop offset="60%" style="stop-color:#e8e4dc"/>
      <stop offset="100%" style="stop-color:#ccc7bc"/>
    </linearGradient>
    <linearGradient id="temple-polished" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0cac0"/>
      <stop offset="100%" style="stop-color:#c4bdb2"/>
    </linearGradient>
    <linearGradient id="grass-t" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c3f"/>
      <stop offset="100%" style="stop-color:#3a6830"/>
    </linearGradient>
    <filter id="stone-texture-temple">
      <feTurbulence type="fractalNoise" baseFrequency="1.0" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="shadow-temple">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="400" height="500" fill="#e8eef5" rx="12"/>

  <!-- Grass -->
  <ellipse cx="200" cy="460" rx="200" ry="60" fill="url(#grass-t)"/>
  <rect x="0" y="460" width="400" height="40" fill="url(#grass-t)"/>

  <!-- Ground shadow -->
  <ellipse cx="205" cy="445" rx="105" ry="14" fill="rgba(0,0,0,0.12)"/>

  <!-- Base plinth -->
  <rect x="90" y="415" width="220" height="35" rx="3" fill="#c4bdb2" filter="url(#shadow-temple)"/>

  <!-- Column bases -->
  <rect x="105" y="395" width="30" height="24" rx="2" fill="#ccc7bc" filter="url(#shadow-temple)"/>
  <rect x="265" y="395" width="30" height="24" rx="2" fill="#c4bdb2"/>

  <!-- Left column (turned/fluted) -->
  <rect x="112" y="155" width="16" height="240" rx="2" fill="url(#granite-temple)" filter="url(#stone-texture-temple)"/>
  <!-- Fluting lines -->
  <line x1="116" y1="165" x2="116" y2="390" stroke="#b8b2a6" stroke-width="0.3"/>
  <line x1="120" y1="165" x2="120" y2="390" stroke="#b8b2a6" stroke-width="0.3"/>
  <line x1="124" y1="165" x2="124" y2="390" stroke="#b8b2a6" stroke-width="0.3"/>
  <!-- Column capital -->
  <rect x="108" y="148" width="24" height="10" rx="2" fill="#d4cfc6"/>
  <rect x="106" y="140" width="28" height="10" rx="2" fill="#d4cfc6"/>

  <!-- Right column (turned/fluted) -->
  <rect x="272" y="155" width="16" height="240" rx="2" fill="url(#granite-temple)" filter="url(#stone-texture-temple)"/>
  <!-- Fluting lines -->
  <line x1="276" y1="165" x2="276" y2="390" stroke="#b8b2a6" stroke-width="0.3"/>
  <line x1="280" y1="165" x2="280" y2="390" stroke="#b8b2a6" stroke-width="0.3"/>
  <line x1="284" y1="165" x2="284" y2="390" stroke="#b8b2a6" stroke-width="0.3"/>
  <!-- Column capital -->
  <rect x="268" y="148" width="24" height="10" rx="2" fill="#d4cfc6"/>
  <rect x="266" y="140" width="28" height="10" rx="2" fill="#d4cfc6"/>

  <!-- Canopy top (pediment) -->
  <path d="M100 140 L200 80 L300 140 Z"
        fill="url(#granite-temple)" filter="url(#stone-texture-temple)"/>
  <!-- Inner pediment line -->
  <path d="M120 137 L200 92 L280 137"
        fill="none" stroke="#b8b2a6" stroke-width="0.5"/>

  <!-- Cross at apex -->
  <line x1="200" y1="60" x2="200" y2="85" stroke="#b0a898" stroke-width="2.5"/>
  <line x1="190" y1="70" x2="210" y2="70" stroke="#b0a898" stroke-width="2.5"/>

  <!-- Entablature (horizontal beam) -->
  <rect x="100" y="136" width="200" height="8" rx="1" fill="#ccc7bc"/>

  <!-- Back panel between columns -->
  <rect x="130" y="155" width="140" height="240" fill="url(#temple-polished)" opacity="0.85"/>

  <!-- Inscription on back panel -->
  <text x="200" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7a7060" letter-spacing="2">IN LOVING</text>
  <text x="200" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7a7060" letter-spacing="2">MEMORY</text>

  <line x1="160" y1="222" x2="240" y2="222" stroke="#a09888" stroke-width="0.5"/>

  <text x="200" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#605545" letter-spacing="1">Richard</text>
  <text x="200" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#605545" letter-spacing="1">Pemberton</text>
  <text x="200" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7a7060">1928 — 2024</text>

  <line x1="160" y1="310" x2="240" y2="310" stroke="#a09888" stroke-width="0.5"/>

  <text x="200" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#7a7060" font-style="italic">A life well lived</text>
  <text x="200" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#7a7060" font-style="italic">A love well given</text>

  <!-- Label -->
  <rect x="100" y="468" width="200" height="24" rx="12" fill="rgba(0,0,0,0.6)"/>
  <text x="200" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" font-weight="500">Temple Style Memorial</text>
</svg>