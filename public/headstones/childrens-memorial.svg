<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="granite-child" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e0e8"/>
      <stop offset="30%" style="stop-color:#ddd4dd"/>
      <stop offset="60%" style="stop-color:#ede5ed"/>
      <stop offset="100%" style="stop-color:#d5ccd5"/>
    </linearGradient>
    <linearGradient id="child-polished" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8cfd8"/>
      <stop offset="100%" style="stop-color:#ccc2cc"/>
    </linearGradient>
    <linearGradient id="grass-ch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c3f"/>
      <stop offset="100%" style="stop-color:#3a6830"/>
    </linearGradient>
    <filter id="stone-texture-child">
      <feTurbulence type="fractalNoise" baseFrequency="1.0" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="shadow-child">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="400" height="500" fill="#e8eef5" rx="12"/>

  <!-- Grass -->
  <ellipse cx="200" cy="460" rx="200" ry="60" fill="url(#grass-ch)"/>
  <rect x="0" y="460" width="400" height="40" fill="url(#grass-ch)"/>

  <!-- Ground shadow -->
  <ellipse cx="205" cy="445" rx="70" ry="10" fill="rgba(0,0,0,0.1)"/>

  <!-- Base -->
  <rect x="130" y="415" width="140" height="28" rx="3" fill="#ccc2cc" filter="url(#shadow-child)"/>

  <!-- Heart-shaped headstone (smaller, softer) -->
  <path d="M200 400
           C200 400, 135 375, 135 285
           C135 240, 148 205, 167 190
           C185 175, 193 182, 200 195
           C207 182, 215 175, 233 190
           C252 205, 265 240, 265 285
           C265 375, 200 400, 200 400 Z"
        fill="url(#granite-child)" filter="url(#stone-texture-child)"/>

  <!-- Polished face -->
  <path d="M200 388
           C200 388, 147 365, 147 287
           C147 247, 158 216, 173 203
           C187 192, 194 197, 200 207
           C206 197, 213 192, 227 203
           C242 216, 253 247, 253 287
           C253 365, 200 388, 200 388 Z"
        fill="url(#child-polished)" opacity="0.85"/>

  <!-- Angel wings decoration at top -->
  <!-- Left wing -->
  <path d="M185 215 Q170 205 162 218 Q155 230 168 225 Q175 222 185 215"
        fill="none" stroke="#a090a0" stroke-width="0.8"/>
  <path d="M180 220 Q168 213 163 224 Q158 232 170 228"
        fill="none" stroke="#a090a0" stroke-width="0.6"/>
  <!-- Right wing -->
  <path d="M215 215 Q230 205 238 218 Q245 230 232 225 Q225 222 215 215"
        fill="none" stroke="#a090a0" stroke-width="0.8"/>
  <path d="M220 220 Q232 213 237 224 Q242 232 230 228"
        fill="none" stroke="#a090a0" stroke-width="0.6"/>
  <!-- Angel head -->
  <circle cx="200" cy="212" r="5" fill="none" stroke="#a090a0" stroke-width="0.8"/>

  <!-- Teddy bear silhouette (small, simple) -->
  <g transform="translate(200, 260) scale(0.6)" opacity="0.4">
    <!-- Body -->
    <ellipse cx="0" cy="12" rx="12" ry="14" fill="#a090a0"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="10" fill="#a090a0"/>
    <!-- Ears -->
    <circle cx="-8" cy="-16" r="4" fill="#a090a0"/>
    <circle cx="8" cy="-16" r="4" fill="#a090a0"/>
    <!-- Inner ears -->
    <circle cx="-8" cy="-16" r="2" fill="#b8a8b8"/>
    <circle cx="8" cy="-16" r="2" fill="#b8a8b8"/>
    <!-- Eyes -->
    <circle cx="-3" cy="-9" r="1.2" fill="#d5ccd5"/>
    <circle cx="3" cy="-9" r="1.2" fill="#d5ccd5"/>
    <!-- Nose -->
    <circle cx="0" cy="-5" r="1.5" fill="#b8a8b8"/>
    <!-- Arms -->
    <ellipse cx="-14" cy="8" rx="4" ry="6" fill="#a090a0" transform="rotate(-20, -14, 8)"/>
    <ellipse cx="14" cy="8" rx="4" ry="6" fill="#a090a0" transform="rotate(20, 14, 8)"/>
  </g>

  <!-- Inscription -->
  <text x="200" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8a7a8a" letter-spacing="1">OUR LITTLE ANGEL</text>

  <line x1="168" y1="315" x2="232" y2="315" stroke="#a090a0" stroke-width="0.4"/>

  <text x="200" y="338" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#706070">Emily Grace</text>
  <text x="200" y="356" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8a7a8a">2024</text>

  <!-- Small stars -->
  <text x="170" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#a090a0">*</text>
  <text x="200" y="378" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#a090a0" font-style="italic">Too beautiful for earth</text>
  <text x="230" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#a090a0">*</text>

  <!-- Label -->
  <rect x="100" y="468" width="200" height="24" rx="12" fill="rgba(0,0,0,0.6)"/>
  <text x="200" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" font-weight="500">Children's Memorial</text>
</svg>