<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="granite-book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#555"/>
      <stop offset="40%" style="stop-color:#484848"/>
      <stop offset="70%" style="stop-color:#5a5a5a"/>
      <stop offset="100%" style="stop-color:#404040"/>
    </linearGradient>
    <linearGradient id="book-page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="grass-b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c3f"/>
      <stop offset="100%" style="stop-color:#3a6830"/>
    </linearGradient>
    <filter id="stone-texture-book">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="shadow-book">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="400" height="500" fill="#e8eef5" rx="12"/>

  <!-- Grass -->
  <ellipse cx="200" cy="460" rx="200" ry="60" fill="url(#grass-b)"/>
  <rect x="0" y="460" width="400" height="40" fill="url(#grass-b)"/>

  <!-- Ground shadow -->
  <ellipse cx="205" cy="420" rx="130" ry="15" fill="rgba(0,0,0,0.12)"/>

  <!-- Book base/plinth -->
  <rect x="70" y="390" width="260" height="35" rx="3" fill="#484848" filter="url(#shadow-book)"/>

  <!-- Book spine (center) -->
  <rect x="192" y="200" width="16" height="190" rx="2" fill="#3a3a3a"/>
  <line x1="200" y1="205" x2="200" y2="385" stroke="#555" stroke-width="0.5"/>

  <!-- Left page -->
  <path d="M90 210 Q90 195, 105 195 L192 200 L192 390 L105 385 Q90 385, 90 370 Z"
        fill="url(#granite-book)" filter="url(#stone-texture-book)"/>
  <!-- Left page polished face -->
  <path d="M100 220 Q100 210, 112 210 L185 214 L185 380 L112 376 Q100 376, 100 366 Z"
        fill="url(#book-page)" opacity="0.9"/>

  <!-- Right page -->
  <path d="M208 200 L295 195 Q310 195, 310 210 L310 370 Q310 385, 295 385 L208 390 Z"
        fill="url(#granite-book)" filter="url(#stone-texture-book)"/>
  <!-- Right page polished face -->
  <path d="M215 214 L288 210 Q300 210, 300 220 L300 366 Q300 376, 288 376 L215 380 Z"
        fill="url(#book-page)" opacity="0.9"/>

  <!-- Left page text -->
  <text x="142" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#aaa" letter-spacing="2">IN LOVING</text>
  <text x="142" y="266" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#aaa" letter-spacing="2">MEMORY OF</text>

  <line x1="112" y1="280" x2="172" y2="280" stroke="#777" stroke-width="0.5"/>

  <text x="142" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c0c0c0">James</text>
  <text x="142" y="325" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c0c0c0">Williams</text>
  <text x="142" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#999">1938 — 2024</text>

  <!-- Right page text -->
  <text x="257" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#999" font-style="italic">Gone but never</text>
  <text x="257" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#999" font-style="italic">forgotten.</text>
  <text x="257" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#999" font-style="italic">Forever in</text>
  <text x="257" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#999" font-style="italic">our hearts.</text>

  <!-- Small rose decoration on right page -->
  <circle cx="257" cy="340" r="8" fill="none" stroke="#888" stroke-width="0.8"/>
  <circle cx="257" cy="340" r="4" fill="none" stroke="#888" stroke-width="0.6"/>
  <line x1="257" y1="348" x2="257" y2="365" stroke="#777" stroke-width="0.8"/>
  <path d="M253 358 Q257 352 261 358" fill="none" stroke="#777" stroke-width="0.6"/>

  <!-- Label -->
  <rect x="110" y="468" width="180" height="24" rx="12" fill="rgba(0,0,0,0.6)"/>
  <text x="200" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" font-weight="500">Book Memorial</text>
</svg>