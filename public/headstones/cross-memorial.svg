<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="granite-cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e0d4"/>
      <stop offset="30%" style="stop-color:#d9d0c2"/>
      <stop offset="60%" style="stop-color:#ece4d8"/>
      <stop offset="100%" style="stop-color:#d0c7b8"/>
    </linearGradient>
    <linearGradient id="cross-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ddd5c8"/>
      <stop offset="100%" style="stop-color:#ccc3b4"/>
    </linearGradient>
    <linearGradient id="grass-c" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c3f"/>
      <stop offset="100%" style="stop-color:#3a6830"/>
    </linearGradient>
    <filter id="stone-texture-cross">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="shadow-cross">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="400" height="500" fill="#e8eef5" rx="12"/>

  <!-- Grass -->
  <ellipse cx="200" cy="460" rx="200" ry="60" fill="url(#grass-c)"/>
  <rect x="0" y="460" width="400" height="40" fill="url(#grass-c)"/>

  <!-- Ground shadow -->
  <ellipse cx="208" cy="445" rx="90" ry="12" fill="rgba(0,0,0,0.12)"/>

  <!-- Base plinth -->
  <rect x="115" y="415" width="170" height="35" rx="3" fill="#ccc3b4" filter="url(#shadow-cross)"/>
  <!-- Base plinth polished -->
  <rect x="122" y="418" width="156" height="28" rx="2" fill="url(#cross-face)"/>

  <!-- Cross vertical beam -->
  <rect x="175" y="80" width="50" height="340" rx="2" fill="url(#granite-cross)" filter="url(#stone-texture-cross)"/>

  <!-- Cross horizontal beam -->
  <rect x="130" y="130" width="140" height="45" rx="2" fill="url(#granite-cross)" filter="url(#stone-texture-cross)"/>

  <!-- Celtic circle detail -->
  <circle cx="200" cy="152" r="38" fill="none" stroke="url(#cross-face)" stroke-width="3"/>
  <circle cx="200" cy="152" r="32" fill="none" stroke="#b8ad9e" stroke-width="0.5"/>

  <!-- Decorative interlace on cross center -->
  <circle cx="200" cy="152" r="12" fill="none" stroke="#b8ad9e" stroke-width="1"/>

  <!-- Engraving on vertical beam below arms -->
  <text x="200" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8a7e6e" letter-spacing="2">IN LOVING</text>
  <text x="200" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8a7e6e" letter-spacing="2">MEMORY</text>

  <line x1="183" y1="238" x2="217" y2="238" stroke="#a0957e" stroke-width="0.5"/>

  <text x="200" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#706555" letter-spacing="1">Patrick</text>
  <text x="200" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#706555" letter-spacing="1">O'Brien</text>

  <text x="200" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8a7e6e">1940 — 2024</text>

  <line x1="183" y1="325" x2="217" y2="325" stroke="#a0957e" stroke-width="0.5"/>

  <text x="200" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8a7e6e" font-style="italic">Rest in peace</text>

  <!-- Engraving on base -->
  <text x="200" y="437" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8a7e6e" letter-spacing="1">BELOVED FATHER</text>

  <!-- Label -->
  <rect x="110" y="468" width="180" height="24" rx="12" fill="rgba(0,0,0,0.6)"/>
  <text x="200" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" font-weight="500">Celtic Cross Memorial</text>
</svg>