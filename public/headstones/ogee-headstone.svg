<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="granite-ogee" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="30%" style="stop-color:#3d3d3d"/>
      <stop offset="60%" style="stop-color:#505050"/>
      <stop offset="100%" style="stop-color:#383838"/>
    </linearGradient>
    <linearGradient id="granite-edge-ogee" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a5a5a"/>
      <stop offset="50%" style="stop-color:#4a4a4a"/>
      <stop offset="100%" style="stop-color:#3a3a3a"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c3f"/>
      <stop offset="100%" style="stop-color:#3a6830"/>
    </linearGradient>
    <filter id="stone-texture-ogee">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="shadow-ogee">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="500" fill="#e8eef5" rx="12"/>

  <!-- Grass -->
  <ellipse cx="200" cy="460" rx="200" ry="60" fill="url(#grass)"/>
  <rect x="0" y="460" width="400" height="40" fill="url(#grass)" rx="0"/>

  <!-- Headstone shadow on ground -->
  <ellipse cx="210" cy="445" rx="90" ry="12" fill="rgba(0,0,0,0.15)"/>

  <!-- Headstone base -->
  <rect x="105" y="420" width="190" height="30" rx="3" fill="url(#granite-edge-ogee)" filter="url(#shadow-ogee)"/>

  <!-- Main headstone body -->
  <path d="M130 420 L130 180 Q130 120 200 100 Q270 120 270 180 L270 420 Z"
        fill="url(#granite-ogee)" filter="url(#stone-texture-ogee)"/>

  <!-- Polished face -->
  <path d="M145 410 L145 190 Q145 135 200 118 Q255 135 255 190 L255 410 Z"
        fill="#2d2d2d" opacity="0.9"/>

  <!-- Engraving text -->
  <text x="200" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#b8b8b8" letter-spacing="3">IN LOVING</text>
  <text x="200" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#b8b8b8" letter-spacing="3">MEMORY</text>

  <!-- Decorative line -->
  <line x1="165" y1="240" x2="235" y2="240" stroke="#888" stroke-width="0.5"/>

  <!-- Sample name placeholder -->
  <text x="200" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c0c0c0" letter-spacing="1">John Smith</text>
  <text x="200" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#999" letter-spacing="1">1945 — 2024</text>

  <!-- Decorative line -->
  <line x1="165" y1="320" x2="235" y2="320" stroke="#888" stroke-width="0.5"/>

  <text x="200" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#999" font-style="italic">Forever in our hearts</text>

  <!-- Label -->
  <rect x="110" y="468" width="180" height="24" rx="12" fill="rgba(0,0,0,0.6)"/>
  <text x="200" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="white" font-weight="500">Ogee Headstone</text>
</svg>